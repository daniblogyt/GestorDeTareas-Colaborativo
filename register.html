<!-- register.html -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta - AutoElite</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="auth-page">
    <div class="auth-bg"></div>

    <div class="auth-wrapper">
      <a href="index.html" class="auth-logo">
        <span class="logo-main">AUTO</span>
        <span class="logo-accent">ELITE</span>
      </a>

      <div class="auth-card">
        <span class="section-label">Nuevo Cliente</span>
        <h2 class="auth-title">Crear Cuenta</h2>
        <p class="auth-subtitle">
          Únete a la experiencia AutoElite y accede a vehículos exclusivos
        </p>

        <form id="registerForm" onsubmit="handleRegister(event)">
          <!-- Fila 1: Nombre y Email -->
          <div class="form-row">
            <div class="input-group">
              <label for="regNombre">Nombre Completo</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input
                  type="text"
                  id="regNombre"
                  placeholder="Tu nombre completo"
                  required
                />
              </div>
            </div>

            <div class="input-group">
              <label for="regEmail">Correo Electrónico</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  ></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <input
                  type="email"
                  id="regEmail"
                  placeholder="tu@email.com"
                  required
                />
              </div>
            </div>
          </div>

          <!-- Fila 2: Contraseñas -->
          <div class="form-row">
            <div class="input-group">
              <label for="regPassword">Contraseña</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input
                  type="password"
                  id="regPassword"
                  placeholder="••••••••"
                  required
                  minlength="6"
                />
              </div>
              <span class="input-hint">Mínimo 6 caracteres</span>
            </div>

            <div class="input-group">
              <label for="regPassword2">Confirmar Contraseña</label>
              <div class="input-wrapper">
                <svg
                  class="input-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input
                  type="password"
                  id="regPassword2"
                  placeholder="••••••••"
                  required
                />
              </div>
            </div>
          </div>

          <!-- Términos -->
          <div class="terms-group">
            <label class="checkbox-wrapper">
              <input type="checkbox" required />
              <span class="checkmark"></span>
              <span class="terms-text">
                Acepto los <a href="#">Términos y Condiciones</a> y la
                <a href="#">Política de Privacidad</a>
              </span>
            </label>
          </div>

          <button type="submit" class="btn-submit">
            <span>Crear Cuenta</span>
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>

        <div class="auth-footer-elegant">
          <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </div>
      </div>
    </div>

    <script src="/js/auth/register.js"></script>
  </body>
</html>
